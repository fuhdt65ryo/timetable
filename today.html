<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日の時間割</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #fff;
      color: #2d3748;
    }

    /* ── 全体レイアウト：左＝日付、右＝コマ一覧 ── */
    .widget {
      display: flex;
      gap: 10px;
      padding: 10px 12px;
      align-items: flex-start;
    }

    /* 左：日付列 */
    .date-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-width: 36px;
      padding-top: 2px;
    }

    .header-date {
      font-size: 18px;
      font-weight: 800;
      color: #1a202c;
      line-height: 1.1;
      text-align: center;
    }

    .header-day {
      font-size: 11px;
      color: #a0aec0;
      font-weight: 600;
      margin-top: 2px;
    }

    .footer {
      margin-top: 6px;
      font-size: 9px;
      text-align: center;
      color: #a0aec0;
      transition: color .2s;
    }
    .footer.syncing { color: #4a6cf7; }
    .footer.ok      { color: #38a169; }

    /* 右：コマ一覧 */
    .periods-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    /* ── バナー ── */
    .holiday-banner {
      background: #fff5f5;
      border: 1.5px solid #feb2b2;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      color: #c53030;
      font-size: 13px;
      font-weight: 600;
    }

    .event-banner {
      background: #fffbeb;
      border: 1.5px solid #f6e05e;
      border-radius: 7px;
      padding: 5px 10px;
      margin-bottom: 4px;
      color: #744210;
      font-size: 11px;
    }

    .no-class {
      text-align: center;
      padding: 16px;
      color: #a0aec0;
      font-size: 12px;
    }

    /* ── コマ行 ── */
    .period-row {
      display: flex;
      align-items: stretch;
      border-radius: 7px;
      overflow: hidden;
      background: #f7fafc;
      border: 1.5px dashed #e2e8f0;
      height: 30px;
    }

    .period-row.has-content {
      border-style: solid;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    .period-row.is-dark { border-style: solid; }

    /* コマ番号 */
    .period-num {
      width: 42px;
      min-width: 42px;
      display: grid;
      grid-template-columns: 16px 1fr;
      align-items: center;
      justify-items: center;
      border-right: 1px solid rgba(0,0,0,.07);
      border-radius: 5px 0 0 5px;
      padding: 0 3px;
    }

    .period-label {
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
      justify-self: center;
    }

    /* セル内容 */
    .period-content {
      flex: 1;
      padding: 4px 7px;
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .class-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .class-name {
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .subject-tag {
      font-size: 9px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .period-content-text {
      font-size: 11px;
      color: #4a5568;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .empty-label {
      font-size: 11px;
      color: #cbd5e0;
      padding: 4px 8px;
      align-self: center;
    }

    /* dark系 */
    .is-dark .class-name        { color: rgba(255,255,255,.9); }
    .is-dark .period-content-text { color: rgba(255,255,255,.75); }

    /* ── バッジ列 ── */
    .badge-col {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
      padding: 3px 5px 3px 2px;
      flex-shrink: 0;
    }

    .badge-rinji {
      font-size: .5rem;
      font-weight: 800;
      background: #fff;
      color: #1565C0;
      border: 1.5px solid #1565C0;
      border-radius: 3px;
      padding: 0 3px;
      line-height: 1.6;
      white-space: nowrap;
    }

    .badge-chg {
      font-size: .5rem;
      font-weight: 800;
      background: linear-gradient(135deg,#4A6DB5,#2c47a0);
      color: #fff;
      border-radius: 3px;
      padding: 0 4px;
      line-height: 1.6;
      white-space: nowrap;
    }

    .badge-absence {
      font-size: .5rem;
      font-weight: 800;
      background: #fff;
      border-radius: 3px;
      padding: 0 3px;
      line-height: 1.6;
      white-space: nowrap;
    }

    .badge-absence.nenkyuu { color: #E65100; border: 1.5px solid #FB8C00; }
    .badge-absence.shuccho { color: #2E7D32; border: 1.5px solid #388E3C; }

    .badge-src {
      font-size: .48rem;
      font-weight: 700;
      background: #fff;
      color: #718096;
      border: 1px solid #e2e8f0;
      border-radius: 3px;
      padding: 0 2px;
      line-height: 1.4;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div class="widget">
  <div class="date-col">
    <div class="header-date" id="headerDate"></div>
    <div class="header-day"  id="headerDay"></div>
    <div class="footer" id="footer"></div>
  </div>
  <div class="periods-col" id="content"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
/* ── 基本時間割（メインアプリと同期） ── */
const BASE = {
  '0-1':{ name:'3-3',  room:'理科', color:'#D4BE00' },
  '0-2':{ name:'3-4',  room:'理科', color:'#3DAE65' },
  '0-3':{ name:'2-4',  room:'理科', color:'#E06010' },
  '0-4':{ name:'3-1',  room:'道徳', color:'#9C6ADE' },
  '0-5':{ name:'3-1',  room:'理科', color:'#D44545' },
  '0-6':{ name:'空き',  room:'',    color:'#B07D4E' },
  '1-1':{ name:'2-4',  room:'理科', color:'#E06010' },
  '1-2':{ name:'3-3',  room:'理科', color:'#D4BE00' },
  '1-3':{ name:'3-1',  room:'理科', color:'#D44545' },
  '1-4':{ name:'3-2',  room:'理科', color:'#4A90D9' },
  '1-5':{ name:'3-1',  room:'学活', color:'#9C6ADE' },
  '1-6':{ name:'裁量',  room:'',    color:'#546E7A' },
  '2-1':{ name:'3-4',  room:'理科', color:'#3DAE65' },
  '2-2':{ name:'2-4',  room:'理科', color:'#E06010' },
  '2-3':{ name:'3-3',  room:'理科', color:'#D4BE00' },
  '2-4':{ name:'3-2',  room:'理科', color:'#4A90D9' },
  '2-5':{ name:'3-1',  room:'理科', color:'#D44545' },
  '2-6':{ name:'空き',  room:'',    color:'#B07D4E' },
  '3-1':{ name:'空き',  room:'',    color:'#B07D4E' },
  '3-2':{ name:'3-3',  room:'理科', color:'#D4BE00' },
  '3-3':{ name:'研究部', room:'',   color:'#3D7A6E' },
  '3-4':{ name:'3-2',  room:'理科', color:'#4A90D9' },
  '3-5':{ name:'3-4',  room:'理科', color:'#3DAE65' },
  '4-1':{ name:'空き',  room:'',    color:'#B07D4E' },
  '4-2':{ name:'3-4',  room:'理科', color:'#3DAE65' },
  '4-3':{ name:'2-4',  room:'理科', color:'#E06010' },
  '4-4':{ name:'3-2',  room:'理科', color:'#4A90D9' },
  '4-5':{ name:'3-1',  room:'理科', color:'#D44545' },
  '4-6':{ name:'3-1',  room:'総合', color:'#9C6ADE' },
};

const CLASSES = [
  { name:'2-4',  subjects:[{name:'理科',color:'#E06010'},{name:'自習',color:'#78909C'}] },
  { name:'3-1',  tanin:true, subjects:[{name:'理科',color:'#D44545'},{name:'学活',color:'#9C6ADE'},{name:'道徳',color:'#9C6ADE'},{name:'総合',color:'#9C6ADE'},{name:'自習',color:'#78909C'}] },
  { name:'3-2',  subjects:[{name:'理科',color:'#4A90D9'},{name:'自習',color:'#78909C'}] },
  { name:'3-3',  subjects:[{name:'理科',color:'#D4BE00'},{name:'自習',color:'#78909C'}] },
  { name:'3-4',  subjects:[{name:'理科',color:'#3DAE65'},{name:'自習',color:'#78909C'}] },
  { name:'研究部', color:'#3D7A6E', subjects:[] },
  { name:'裁量',   color:'#546E7A', subjects:[] },
  { name:'行事',   color:'#9E9E9E', isEvent:true, subjects:[] },
];

const PERIODS     = [1,2,3,4,5,6];
const TIMES       = [
  ['8:50','9:40'],['9:50','10:40'],['10:50','11:40'],
  ['13:00','13:50'],['14:00','14:50'],['15:00','15:50']
];
const DARK_CLASSES  = new Set(['裁量']);
const LIGHT_CLASSES = new Set(['空き','研究部','行事']);
const EVENT_CLASSES = new Set(['行事']);
const DI_TO_NAME    = ['月','火','水','木','金','土','日'];
const DAY_JP        = ['日','月','火','水','木','金','土'];

function pad2(n) { return String(n).padStart(2,'0'); }
function toDateStr(d) { return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function dayIdx(d) { const w = d.getDay(); return w === 0 ? 6 : w - 1; }
function parseDateStr(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); }

function pastelizeColor(hex, strength = .42) {
  if (!hex || hex.length < 7) return hex;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*strength+255*(1-strength))},${Math.round(g*strength+255*(1-strength))},${Math.round(b*strength+255*(1-strength))})`;
}

function getColor(name, subject) {
  const c = CLASSES.find(c => c.name === name);
  if (!c) return '#B0BEC5';
  return c.subjects.find(s => s.name === subject)?.color || c.subjects[0]?.color || c.color || '#B0BEC5';
}

function getEntry(ds, period, overrides, daySchedules, cellSources) {
  const ok = `${ds}-${period}`;
  if (ok in overrides) return overrides[ok];
  if (ok in cellSources) {
    const src = cellSources[ok];
    return BASE[`${src.di}-${src.p}`] || null;
  }
  const d  = parseDateStr(ds);
  const di = ds in daySchedules ? daySchedules[ds] : dayIdx(d);
  if (di < 0 || di > 6) return null;
  return BASE[`${di}-${period}`] || null;
}

function getEffectiveSrc(ds, period, overrides, daySchedules, cellSources) {
  const ok = `${ds}-${period}`;
  if (ok in cellSources) return cellSources[ok];
  const d  = parseDateStr(ds);
  const naturalDi = dayIdx(d);
  const di = ds in daySchedules ? daySchedules[ds] : naturalDi;
  return { di, p: period };
}

function absenceCoversPeriod(holEntry, period) {
  if (!holEntry || (holEntry.type !== 'nenkyuu' && holEntry.type !== 'shuccho')) return false;
  const pf = holEntry.periodFrom;
  if (!pf || pf === 'all') return true;
  const from = +pf, to = holEntry.periodTo ? +holEntry.periodTo : 6;
  return period >= from && period <= to;
}

function setFooter(state) {
  const el = document.getElementById('footer');
  const now = new Date();
  const t = `${now.getHours()}:${pad2(now.getMinutes())}`;
  el.className = 'footer ' + state;
  el.textContent = state === 'syncing' ? '⟳ 同期中…' : `✓ 同期済 ${t}`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// まずlocalStorageのキャッシュを読み込んで即座に表示
let _overrides    = {};
let _daySchedules = {};
let _cellSources  = {};
let _holidays     = {};
try { _overrides    = JSON.parse(localStorage.getItem('tt_overrides_v1') || '{}'); } catch {}
try { _daySchedules = JSON.parse(localStorage.getItem('tt_daysched_v1')  || '{}'); } catch {}
try { _cellSources  = JSON.parse(localStorage.getItem('tt_cellsrc_v1')   || '{}'); } catch {}
try { _holidays     = JSON.parse(localStorage.getItem('tt_holidays_v1')  || '{}'); } catch {}

function applyFbData(data) {
  if (!data) return;
  if (data.tt_overrides_v1 !== undefined) {
    _overrides = {};
    for (const [k, v] of Object.entries(data.tt_overrides_v1 || {})) {
      _overrides[k] = (v && v.__deleted__ === true && Object.keys(v).length === 1) ? null : v;
    }
    localStorage.setItem('tt_overrides_v1', JSON.stringify(_overrides));
  }
  if (data.tt_daysched_v1 !== undefined) { _daySchedules = data.tt_daysched_v1 || {}; localStorage.setItem('tt_daysched_v1', JSON.stringify(_daySchedules)); }
  if (data.tt_cellsrc_v1  !== undefined) { _cellSources  = data.tt_cellsrc_v1  || {}; localStorage.setItem('tt_cellsrc_v1',  JSON.stringify(_cellSources));  }
  if (data.tt_holidays_v1 !== undefined) { _holidays     = data.tt_holidays_v1 || {}; localStorage.setItem('tt_holidays_v1', JSON.stringify(_holidays));     }
  render();
}

const _fbConfig = {
  apiKey: "AIzaSyBK8aZpB0O1HCbUzXk8A4bz95k8hW-MIKo",
  authDomain: "timetable-a17e2.firebaseapp.com",
  databaseURL: "https://timetable-a17e2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "timetable-a17e2",
  storageBucket: "timetable-a17e2.firebasestorage.app",
  messagingSenderId: "936420205250",
  appId: "1:936420205250:web:168446baa909186f1c515b"
};
if (!firebase.apps.length) firebase.initializeApp(_fbConfig);
const _fbRef = firebase.database().ref('timetable_data');

setFooter('syncing');
firebase.auth().signInAnonymously().catch(() => {}).finally(() => {
  _fbRef.on('value', snap => { applyFbData(snap.val()); setFooter('ok'); }, () => setFooter('ok'));
});

function render() {
  const today = new Date();
  const ds    = toDateStr(today);
  const dow   = today.getDay();

  document.getElementById('headerDate').textContent = `${today.getMonth()+1}月${today.getDate()}日`;
  document.getElementById('headerDay').textContent  = `（${DAY_JP[dow]}）`;

  const overrides    = _overrides;
  const daySchedules = _daySchedules;
  const cellSources  = _cellSources;
  const holidays     = _holidays;

  const content = document.getElementById('content');

  // 休日
  const holRaw = holidays[ds];
  if (holRaw) {
    const holName = typeof holRaw === 'string' ? holRaw : holRaw.name;
    const holType = typeof holRaw === 'object' ? holRaw.type : 'holiday';
    if (holType === 'holiday') {
      content.innerHTML = `<div class="holiday-banner">🏖️ ${esc(holName)}</div>`;
      // footer is managed separately
      return;
    }
  }

  // 土日で授業なし
  if ((dow === 0 || dow === 6) && !(ds in daySchedules)) {
    const hasAny = PERIODS.some(p => getEntry(ds, p, overrides, daySchedules, cellSources));
    if (!hasAny) {
      content.innerHTML = `<div class="no-class">📅 今日は授業がありません</div>`;
      // footer is managed separately
      return;
    }
  }

  // 今日のholEntry（年休・出張用）
  const holEntry = (() => {
    const v = holidays[ds];
    if (!v) return null;
    if (typeof v === 'string') return { name: v, type: 'holiday' };
    return { name: v.name, type: v.type || 'holiday', periodFrom: v.periodFrom, periodTo: v.periodTo };
  })();

  // 行事バナー
  const firstEntry = getEntry(ds, 1, overrides, daySchedules, cellSources);
  const allEvent   = PERIODS.every(p => {
    const e = getEntry(ds, p, overrides, daySchedules, cellSources);
    return e && EVENT_CLASSES.has(e.name);
  });

  let html = '';
  if (firstEntry && EVENT_CLASSES.has(firstEntry.name) && firstEntry.teacher) {
    html += `<div class="event-banner">📌 ${esc(firstEntry.teacher)}</div>`;
  }
  if (allEvent) {
    content.innerHTML = html + `<div class="no-class">📌 本日は行事日程です</div>`;
    // footer is managed separately
    return;
  }

  html += '<div class="periods">';

  for (const p of PERIODS) {
    const entry = getEntry(ds, p, overrides, daySchedules, cellSources);
    const [tStart, tEnd] = TIMES[p - 1];

    const isDark  = entry && DARK_CLASSES.has(entry.name);
    const isLight = entry && LIGHT_CLASSES.has(entry.name);
    const hasContent = entry && (entry.teacher || isLight);

    let rowClass = 'period-row';
    if (isDark)       rowClass += ' is-dark';
    else if (isLight) rowClass += ' is-light';
    if (hasContent)   rowClass += ' has-content';

    // 色
    const color = entry ? (getColor(entry.name, entry.room) || entry.color || '#B0BEC5') : '#B0BEC5';
    const bg    = isDark ? color : pastelizeColor(color);

    // 数字列スタイル
    const numBg = entry ? pastelizeColor(color, .3) : '#f7fafc';
    const numStyle = `background:${numBg}`;
    const numLabelColor = isDark ? 'rgba(255,255,255,.85)' : (entry ? color : '#a0aec0');

    // ボーダー＋行背景
    let borderStyle = '';
    if (!entry || (!hasContent && !isDark)) {
      borderStyle = `border-color:${color || '#e2e8f0'}`;
    } else if (hasContent && !isDark) {
      borderStyle = `border-color:${color};border-style:solid;background:${pastelizeColor(color, .12)}`;
    } else if (isDark) {
      borderStyle = `border-color:${color};border-style:solid;background:${bg}`;
    }

    // バッジ
    const isRinji       = entry?.rinji;
    const isJugyoHenkou = entry?.jugyohenkou;
    const absHolEntry   = holEntry;
    const isAbsent      = absHolEntry && absenceCoversPeriod(absHolEntry, p);
    const absType       = isAbsent ? absHolEntry.type : null;

    // 移動元バッジ（cellSources）
    const ok = `${ds}-${p}`;
    const d  = parseDateStr(ds);
    let srcBadge = '';
    if (ok in cellSources) {
      const src = cellSources[ok];
      srcBadge = entry ? `${DI_TO_NAME[src.di]}${src.p}` : '';
    } else if (ds in daySchedules) {
      srcBadge = `${DI_TO_NAME[daySchedules[ds]]}${p}`;
    }

    if (!entry) {
      html += `
        <div class="${rowClass}" style="${borderStyle}">
          <div class="period-num" style="${numStyle}">
            <div class="period-label" style="color:${numLabelColor}">${p}</div>
            <div class="period-time">${tStart}<br>${tEnd}</div>
          </div>
          <div class="empty-label">―</div>
        </div>`;
      continue;
    }

    const numBadge  = srcBadge ? `<span class="badge-src">${esc(srcBadge)}</span>` : '';
    const sideBadges = [
      isRinji       ? '<span class="badge-rinji">臨</span>' : '',
      isJugyoHenkou ? '<span class="badge-chg">授業変更</span>' : '',
      isAbsent      ? `<span class="badge-absence ${absType}">${absType==='nenkyuu'?'年休':'出張'}</span>` : '',
    ].filter(Boolean).join('');
    const badgeCol = sideBadges ? `<div class="badge-col">${sideBadges}</div>` : '';

    if (isDark) {
      html += `
        <div class="${rowClass}" style="${borderStyle}">
          <div class="period-num" style="${numStyle};border-right-color:rgba(255,255,255,.2)">
            <div class="period-label" style="color:${numLabelColor}">${p}</div>
            ${numBadge}
          </div>
          <div class="period-content">
            <span class="class-name" style="color:rgba(255,255,255,.9)">${esc(entry.name)}</span>
            ${entry.teacher ? `<span class="period-content-text" style="color:rgba(255,255,255,.75)">${esc(entry.teacher)}</span>` : ''}
          </div>
          ${badgeCol}
        </div>`;
      continue;
    }

    // 通常 / LIGHT
    const subjectColor = entry.room === '理科' ? '#2F9E44'
                       : entry.name === '行事'  ? '#868e96'
                       : '#9C6ADE';
    const subjectStyle = `background:${pastelizeColor(subjectColor)};color:${subjectColor}`;
    const textColor = isLight ? '#4a5568' : '#1a202c';

    html += `
      <div class="${rowClass}" style="${borderStyle}">
        <div class="period-num" style="${numStyle}">
          <div class="period-label" style="color:${numLabelColor}">${p}</div>
          ${numBadge}
        </div>
        <div class="period-content">
          <span class="class-dot" style="background:${color}"></span>
          <span class="class-name" style="color:${textColor}">${esc(entry.name)}</span>
          ${entry.room ? `<span class="subject-tag" style="${subjectStyle}">${esc(entry.room)}</span>` : ''}
          ${entry.teacher ? `<span class="period-content-text" style="color:#4a5568">${esc(entry.teacher)}</span>` : ''}
        </div>
        ${badgeCol}
      </div>`;
  }

  html += '</div>';
  content.innerHTML = html;
  // footer is managed separately
}

render();
