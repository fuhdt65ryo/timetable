<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>時間割</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #fff;
      color: #1a202c;
      font-size: 12px;
    }

    /* ── ヘッダー ── */
    header {
      background: #F0A870;
      color: #fff;
      padding: 5px 8px 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .header-title {
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .04em;
    }

    .header-sub {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-week {
      font-size: .6rem;
      color: rgba(255,255,255,.75);
      font-weight: 600;
    }

    .sync-badge {
      font-size: .55rem;
      color: rgba(255,255,255,.8);
      background: rgba(255,255,255,.18);
      padding: 1px 5px;
      border-radius: 10px;
    }
    .sync-badge.ok      { color: rgba(200,255,200,.95); }
    .sync-badge.syncing { color: rgba(255,255,180,.95); }

    /* ── 曜日タブ ── */
    .day-tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .day-tabs::-webkit-scrollbar { display: none; }

    .day-tab {
      flex: 1;
      min-width: 36px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,.6);
      padding: 4px 2px 5px;
      font-size: .68rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      border-bottom: 2px solid transparent;
      transition: all .12s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      line-height: 1.2;
    }
    .day-tab:hover { color: rgba(255,255,255,.85); }
    .day-tab.active {
      color: #fff;
      border-bottom-color: rgba(255,255,255,.9);
      background: rgba(255,255,255,.12);
    }
    .day-tab.is-today .tab-dn {
      background: rgba(255,255,255,.28);
      border-radius: 3px;
      padding: 0 3px;
    }
    .day-tab.is-holiday { color: rgba(255,180,180,.85); }
    .tab-dn { font-size: .72rem; font-weight: 800; }
    .tab-dd { font-size: .58rem; opacity: .85; }

    /* ── メイン ── */
    main { padding: 5px 6px 6px; }

    /* ── バナー系 ── */
    .banner {
      border-radius: 7px;
      padding: 8px 10px;
      text-align: center;
      font-size: .75rem;
      font-weight: 700;
      margin-top: 4px;
    }
    .banner-holiday  { background: #fff5f5; border: 1px solid #feb2b2; color: #c53030; }
    .banner-no-class { background: #f7fafc; border: 1px dashed #e2e8f0; color: #a0aec0; }
    .banner-event    { background: #fffbeb; border: 1px solid #f6e05e; color: #744210; }
    .banner-absence  { border-radius: 6px; padding: 4px 8px; margin-bottom: 4px; font-size: .7rem; font-weight: 700; }
    .banner-absence.nenkyuu { background:#fff8f0; border:1px solid #fb8c00; color:#e65100; }
    .banner-absence.shuccho { background:#f0f8f0; border:1px solid #388e3c; color:#2e7d32; }

    /* ── コマリスト ── */
    .period-list { display: flex; flex-direction: column; gap: 3px; }

    .period-row {
      display: flex;
      align-items: stretch;
      border-radius: 6px;
      border: 1px dashed #e2e8f0;
      overflow: hidden;
      min-height: 28px;
      background: #f7fafc;
    }
    .period-row.has-content {
      border-style: solid;
      background: #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
    }
    .period-row.is-dark { border-style: solid; }

    /* 番号列 */
    .p-num {
      width: 28px;
      min-width: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-right: 1px solid rgba(0,0,0,.06);
      padding: 2px;
      gap: 1px;
    }
    .p-num-label { font-size: .75rem; font-weight: 900; line-height: 1; }
    .p-num-src   { font-size: .45rem; font-weight: 700; color: #718096; background: #f0f0f0; border-radius: 2px; padding: 0 2px; }

    /* 内容列 */
    .p-body {
      flex: 1;
      padding: 3px 6px;
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
      overflow: hidden;
    }
    .p-dot  { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .p-name { font-size: .78rem; font-weight: 800; white-space: nowrap; flex-shrink: 0; }
    .p-room {
      font-size: .6rem; font-weight: 700; padding: 1px 5px;
      border-radius: 10px; white-space: nowrap; flex-shrink: 0;
    }
    .p-teacher { font-size: .65rem; color: #4a5568; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex-shrink: 1; }
    .p-empty   { font-size: .7rem; color: #cbd5e0; padding: 3px 6px; align-self: center; }

    .is-dark .p-name    { color: rgba(255,255,255,.95); }
    .is-dark .p-teacher { color: rgba(255,255,255,.7); }

    /* バッジ列 */
    .p-badges {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
      padding: 2px 4px 2px 2px;
      flex-shrink: 0;
    }
    .badge {
      font-size: .45rem; font-weight: 800; border-radius: 2px;
      padding: 0 3px; line-height: 1.5; white-space: nowrap;
    }
    .badge-rinji   { background:#fff; color:#1565C0; border:1px solid #1565C0; }
    .badge-chg     { background:linear-gradient(135deg,#4A6DB5,#2c47a0); color:#fff; }
    .badge-nenkyuu { background:#fff; color:#E65100; border:1px solid #FB8C00; }
    .badge-shuccho { background:#fff; color:#2E7D32; border:1px solid #388E3C; }

    /* Firebase未設定 */
    .setup-msg { padding: 12px 8px; text-align: center; color: #a0aec0; font-size: .72rem; line-height: 1.6; }
    .setup-msg strong { color: #718096; display: block; margin-bottom: 4px; font-size: .78rem; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="header-title">📅 今週の時間割</span>
    <div class="header-sub">
      <span class="header-week" id="weekLabel"></span>
      <span class="sync-badge" id="syncBadge">…</span>
    </div>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
</header>
<main id="main"></main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const BASE = {
  '0-1':{ name:'3-3',  room:'理科', color:'#D4BE00' },
  '0-2':{ name:'3-4',  room:'理科', color:'#3DAE65' },
  '0-3':{ name:'2-4',  room:'理科', color:'#E06010' },
  '0-4':{ name:'3-1',  room:'道徳', color:'#9C6ADE' },
  '0-5':{ name:'3-1',  room:'理科', color:'#D44545' },
  '0-6':{ name:'空き',  room:'',    color:'#B07D4E' },
  '1-1':{ name:'2-4',  room:'理科', color:'#E06010' },
  '1-2':{ name:'3-3',  room:'理科', color:'#D4BE00' },
  '1-3':{ name:'3-1',  room:'理科', color:'#D44545' },
  '1-4':{ name:'3-2',  room:'理科', color:'#4A90D9' },
  '1-5':{ name:'3-1',  room:'学活', color:'#9C6ADE' },
  '1-6':{ name:'裁量',  room:'',    color:'#546E7A' },
  '2-1':{ name:'3-4',  room:'理科', color:'#3DAE65' },
  '2-2':{ name:'2-4',  room:'理科', color:'#E06010' },
  '2-3':{ name:'3-3',  room:'理科', color:'#D4BE00' },
  '2-4':{ name:'3-2',  room:'理科', color:'#4A90D9' },
  '2-5':{ name:'3-1',  room:'理科', color:'#D44545' },
  '2-6':{ name:'空き',  room:'',    color:'#B07D4E' },
  '3-1':{ name:'空き',  room:'',    color:'#B07D4E' },
  '3-2':{ name:'3-3',  room:'理科', color:'#D4BE00' },
  '3-3':{ name:'研究部', room:'',   color:'#3D7A6E' },
  '3-4':{ name:'3-2',  room:'理科', color:'#4A90D9' },
  '3-5':{ name:'3-4',  room:'理科', color:'#3DAE65' },
  '4-1':{ name:'空き',  room:'',    color:'#B07D4E' },
  '4-2':{ name:'3-4',  room:'理科', color:'#3DAE65' },
  '4-3':{ name:'2-4',  room:'理科', color:'#E06010' },
  '4-4':{ name:'3-2',  room:'理科', color:'#4A90D9' },
  '4-5':{ name:'3-1',  room:'理科', color:'#D44545' },
  '4-6':{ name:'3-1',  room:'総合', color:'#9C6ADE' },
};

const CLASSES = [
  { name:'2-4',  subjects:[{name:'理科',color:'#E06010'}] },
  { name:'3-1',  tanin:true, subjects:[{name:'理科',color:'#D44545'},{name:'学活',color:'#9C6ADE'},{name:'道徳',color:'#9C6ADE'},{name:'総合',color:'#9C6ADE'}] },
  { name:'3-2',  subjects:[{name:'理科',color:'#4A90D9'}] },
  { name:'3-3',  subjects:[{name:'理科',color:'#D4BE00'}] },
  { name:'3-4',  subjects:[{name:'理科',color:'#3DAE65'}] },
  { name:'研究部', color:'#3D7A6E', subjects:[] },
  { name:'裁量',   color:'#546E7A', subjects:[] },
  { name:'行事',   color:'#9E9E9E', subjects:[] },
  { name:'空き',   color:'#B07D4E', subjects:[] },
];

const PERIODS     = [1,2,3,4,5,6];
const DARK_CLASSES  = new Set(['裁量']);
const LIGHT_CLASSES = new Set(['空き','研究部','行事']);
const EVENT_CLASSES = new Set(['行事']);
const DI_TO_NAME    = ['月','火','水','木','金','土','日'];
const DAY_JP        = ['日','月','火','水','木','金','土'];

function pad2(n) { return String(n).padStart(2,'0'); }
function toDateStr(d) { return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function dayIdx(d) { const w = d.getDay(); return w === 0 ? 6 : w - 1; }
function parseDateStr(s) { const [y,m,dd] = s.split('-').map(Number); return new Date(y,m-1,dd); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function pastel(hex, s = .4) {
  if (!hex || hex.length < 7) return hex;
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*s+255*(1-s))},${Math.round(g*s+255*(1-s))},${Math.round(b*s+255*(1-s))})`;
}

function getColor(name, subject) {
  const c = CLASSES.find(c => c.name === name);
  if (!c) return '#B0BEC5';
  return c.subjects.find(s => s.name === subject)?.color || c.subjects[0]?.color || c.color || '#B0BEC5';
}

let _overrides = {}, _daySchedules = {}, _cellSources = {}, _holidays = {}, _baseCurrent = null, _baseNext = null;

function _migrateOverrides(ovr) {
  Object.values(ovr).forEach(e => {
    if (e && 'teacher' in e && !('content' in e)) { e.content = e.teacher; delete e.teacher; }
  });
  return ovr;
}

try { _overrides    = _migrateOverrides(JSON.parse(localStorage.getItem('tt_overrides_v1')    || '{}')); } catch {}
try { _daySchedules = JSON.parse(localStorage.getItem('tt_daysched_v1')     || '{}'); } catch {}
try { _cellSources  = JSON.parse(localStorage.getItem('tt_cellsrc_v1')      || '{}'); } catch {}
try { _holidays     = JSON.parse(localStorage.getItem('tt_holidays_v1')     || '{}'); } catch {}
try { _baseCurrent  = JSON.parse(localStorage.getItem('tt_base_current_v1') || 'null'); } catch {}
try { _baseNext     = JSON.parse(localStorage.getItem('tt_base_next_v1')    || 'null'); } catch {}

function getBase(ds) {
  if (_baseNext && _baseNext.fromDate && ds >= _baseNext.fromDate && _baseNext.base) return _baseNext.base;
  return _baseCurrent || BASE;
}

let _selectedDs = toDateStr(new Date());
let _userClicked = false;

function _autoSelectActiveDay() {
  const week = getWeek();
  for (const d of week) {
    const ds = toDateStr(d);
    const holRaw = _holidays[ds];
    const isHol = holRaw && (typeof holRaw === 'string' || holRaw.type === 'holiday');
    if (isHol) continue;
    if (PERIODS.some(p => getEntry(ds, p))) { _selectedDs = ds; return; }
  }
}

function getWeek() {
  const today = new Date();
  return Array.from({length:7}, (_,i) => { const d = new Date(today); d.setDate(today.getDate()+i); return d; });
}

function getEntry(ds, p) {
  const ok = `${ds}-${p}`;
  if (ok in _overrides) return _overrides[ok];
  const base = getBase(ds);
  if (ok in _cellSources) { const src = _cellSources[ok]; return base[`${src.di}-${src.p}`] || null; }
  const d = parseDateStr(ds);
  const di = ds in _daySchedules ? _daySchedules[ds] : dayIdx(d);
  if (di < 0 || di > 6) return null;
  return base[`${di}-${p}`] || null;
}

function absenceCoversPeriod(hol, p) {
  if (!hol || (hol.type !== 'nenkyuu' && hol.type !== 'shuccho')) return false;
  if (!hol.periodFrom || hol.periodFrom === 'all') return true;
  return p >= +hol.periodFrom && p <= +(hol.periodTo || 6);
}

function setSyncBadge(state) {
  const el = document.getElementById('syncBadge');
  const now = new Date();
  el.className = 'sync-badge ' + state;
  el.textContent = state === 'syncing' ? '⟳' : `✓ ${now.getHours()}:${pad2(now.getMinutes())}`;
}

function renderTabs() {
  const week = getWeek();
  const todayStr = toDateStr(new Date());
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = '';
  week.forEach(d => {
    const ds = toDateStr(d);
    const holRaw = _holidays[ds];
    const isHol = holRaw && (typeof holRaw === 'string' || holRaw.type === 'holiday');
    const btn = document.createElement('button');
    btn.className = 'day-tab'
      + (ds === _selectedDs ? ' active' : '')
      + (ds === todayStr ? ' is-today' : '')
      + (isHol ? ' is-holiday' : '');
    btn.innerHTML = `<span class="tab-dn">${DAY_JP[d.getDay()]}</span><span class="tab-dd">${d.getDate()}</span>`;
    btn.addEventListener('click', () => { _userClicked = true; _selectedDs = ds; render(); });
    tabs.appendChild(btn);
  });
  const week0 = week[0], week6 = week[6];
  document.getElementById('weekLabel').textContent =
    `${week0.getMonth()+1}/${week0.getDate()}〜${week6.getMonth()+1}/${week6.getDate()}`;
}

function renderDay(ds) {
  const main = document.getElementById('main');
  const dow = parseDateStr(ds).getDay();

  const holRaw = _holidays[ds];
  if (holRaw) {
    const holName = typeof holRaw === 'string' ? holRaw : holRaw.name;
    const holType = typeof holRaw === 'object' ? holRaw.type : 'holiday';
    if (holType === 'holiday') { main.innerHTML = `<div class="banner banner-holiday">🏖️ ${esc(holName)}</div>`; return; }
  }

  if ((dow === 0 || dow === 6) && !(ds in _daySchedules)) {
    if (!PERIODS.some(p => getEntry(ds, p))) { main.innerHTML = `<div class="banner banner-no-class">📅 授業なし</div>`; return; }
  }

  const holEntry = (() => {
    const v = _holidays[ds];
    if (!v) return null;
    if (typeof v === 'string') return { name:v, type:'holiday' };
    return { name:v.name, type:v.type||'holiday', periodFrom:v.periodFrom, periodTo:v.periodTo };
  })();

  const allEvent = PERIODS.every(p => { const e = getEntry(ds, p); return e && EVENT_CLASSES.has(e.name); });
  const firstEntry = getEntry(ds, 1);

  let html = '';
  if (holEntry && holEntry.type !== 'holiday') {
    const lbl = holEntry.type === 'nenkyuu' ? '年休' : '出張';
    const range = holEntry.periodFrom ? (holEntry.periodFrom === 'all' ? '終日' : `${holEntry.periodFrom}〜${holEntry.periodTo||6}限`) : '終日';
    html += `<div class="banner-absence ${holEntry.type}">📋 ${lbl}（${range}）</div>`;
  }
  if (firstEntry && EVENT_CLASSES.has(firstEntry.name) && (firstEntry.content || firstEntry.teacher))
    html += `<div class="banner banner-event" style="text-align:left;padding:4px 8px">📌 ${esc(firstEntry.content || firstEntry.teacher)}</div>`;
  if (allEvent) { main.innerHTML = html + `<div class="banner banner-no-class">📌 行事日程</div>`; return; }

  html += '<div class="period-list">';
  for (const p of PERIODS) {
    const entry = getEntry(ds, p);
    const isDark  = entry && DARK_CLASSES.has(entry.name);
    const isLight = entry && LIGHT_CLASSES.has(entry.name);
    const hasContent = entry && (!isLight || entry.content || entry.teacher || isDark);

    const color = entry ? (getColor(entry.name, entry.room) || entry.color || '#B0BEC5') : '#B0BEC5';
    const numBg = entry ? pastel(color, .22) : '#f7fafc';
    const numColor = isDark ? 'rgba(255,255,255,.9)' : (entry ? color : '#a0aec0');

    let rowStyle = '';
    if (!entry) {
      rowStyle = `border-color:${color}`;
    } else if (isDark) {
      rowStyle = `border-color:${color};border-style:solid;background:${color}`;
    } else if (!isLight) {
      rowStyle = `border-color:${color};border-style:solid;background:${pastel(color,.1)}`;
    } else {
      rowStyle = `border-color:${color}`;
    }

    const ok = `${ds}-${p}`;
    let srcBadge = '';
    if (ok in _cellSources) { const src = _cellSources[ok]; srcBadge = entry ? `${DI_TO_NAME[src.di]}${src.p}` : ''; }
    else if (ds in _daySchedules) srcBadge = `${DI_TO_NAME[_daySchedules[ds]]}${p}`;

    const isAbsent = holEntry && absenceCoversPeriod(holEntry, p);
    const absType  = isAbsent ? holEntry.type : null;
    const badges = [
      entry?.rinji       ? `<span class="badge badge-rinji">臨</span>` : '',
      entry?.jugyohenkou ? `<span class="badge badge-chg">変更</span>` : '',
      isAbsent && absType === 'nenkyuu' ? `<span class="badge badge-nenkyuu">年休</span>` : '',
      isAbsent && absType === 'shuccho' ? `<span class="badge badge-shuccho">出張</span>` : '',
    ].filter(Boolean).join('');

    if (!entry) {
      html += `<div class="period-row" style="${rowStyle}">
        <div class="p-num" style="background:${numBg}"><span class="p-num-label" style="color:${numColor}">${p}</span></div>
        <span class="p-empty">―</span></div>`;
      continue;
    }

    const subColor = entry.room === '理科' ? '#2F9E44' : entry.name === '行事' ? '#868e96' : '#9C6ADE';
    const roomTag = entry.room ? `<span class="p-room" style="background:${pastel(subColor)};color:${subColor}">${esc(entry.room)}</span>` : '';
    const dotHtml = !isDark ? `<span class="p-dot" style="background:${color}"></span>` : '';
    const nameColor = isDark ? 'rgba(255,255,255,.95)' : '#1a202c';
    const teacherHtml = (entry.content || entry.teacher) ? `<span class="p-teacher">${esc(entry.content || entry.teacher)}</span>` : '';
    const srcHtml = srcBadge ? `<span class="p-num-src">${esc(srcBadge)}</span>` : '';
    const badgesHtml = badges ? `<div class="p-badges">${badges}</div>` : '';

    html += `<div class="period-row${hasContent?' has-content':''}${isDark?' is-dark':''}" style="${rowStyle}">
      <div class="p-num" style="background:${numBg}">
        <span class="p-num-label" style="color:${numColor}">${p}</span>
        ${srcHtml}
      </div>
      <div class="p-body">
        ${dotHtml}
        <span class="p-name" style="color:${nameColor}">${esc(entry.name)}</span>
        ${roomTag}
        ${teacherHtml}
      </div>
      ${badgesHtml}
    </div>`;
  }
  html += '</div>';
  main.innerHTML = html;
}

function render() {
  renderTabs();
  if (!_selectedDs) { document.getElementById('main').innerHTML = ''; return; }
  renderDay(_selectedDs);
}

function initFirebase() {
  const saved = localStorage.getItem('tt_firebase_config');
  if (!saved) { setSyncBadge('ok'); return; }
  let cfg;
  try { cfg = JSON.parse(saved); } catch { return; }
  if (!firebase.apps.length) firebase.initializeApp(cfg);
  const ref = firebase.database().ref('timetable_data');
  setSyncBadge('syncing');
  firebase.auth().signInAnonymously()
    .catch(e => { console.error('auth error:', e); setSyncBadge('ok'); })
    .then(cred => {
    if (!cred) return; // 認証失敗時はデータ取得しない
    ref.on('value', snap => {
      const data = snap.val();
      if (data) {
        if (data.tt_overrides_v1 !== undefined) {
          _overrides = {};
          for (const [k,v] of Object.entries(data.tt_overrides_v1 || {}))
            _overrides[k] = (v && v.__deleted__ === true && Object.keys(v).length === 1) ? null : v;
          _migrateOverrides(_overrides);
          localStorage.setItem('tt_overrides_v1', JSON.stringify(_overrides));
        }
        if (data.tt_daysched_v1     !== undefined) { _daySchedules = data.tt_daysched_v1 || {};     localStorage.setItem('tt_daysched_v1',     JSON.stringify(_daySchedules)); }
        if (data.tt_cellsrc_v1     !== undefined) { _cellSources  = data.tt_cellsrc_v1  || {};     localStorage.setItem('tt_cellsrc_v1',      JSON.stringify(_cellSources));  }
        if (data.tt_holidays_v1    !== undefined) { _holidays     = data.tt_holidays_v1 || {};     localStorage.setItem('tt_holidays_v1',     JSON.stringify(_holidays));     }
        if (data.tt_base_current_v1 !== undefined) { _baseCurrent = data.tt_base_current_v1 || null; localStorage.setItem('tt_base_current_v1', JSON.stringify(_baseCurrent)); }
        if (data.tt_base_next_v1    !== undefined) { _baseNext    = data.tt_base_next_v1    || null; localStorage.setItem('tt_base_next_v1',    JSON.stringify(_baseNext));    }
      }
      if (!_userClicked) _autoSelectActiveDay();
      render();
      setSyncBadge('ok');
    }, () => setSyncBadge('ok'));
  });
}

_autoSelectActiveDay();
render();
initFirebase();
</script>
